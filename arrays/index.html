<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div id="caixa" class="caixa">
        <label for="v1"  class="label">Valor 1</label>
        <input type="number" name="num1" id="num1" class="inp">

        <label for="v2" class="label">Valor 2</label>
        <input type="number" name="num2" id="num2" class="inp">

        <label for="res" class="label">Resultado</label>
        <input type="number" name="res" id="res" class="inp">

        <div class="buttons">
            <button id="btnSomar" class="botao">+</button>
            <button id="btnSubtrair" class="botao">-</button>
            <button id="btnDividir" class="botao">/</button>
            <button id="btnMultiplicar" class="botao">x</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
