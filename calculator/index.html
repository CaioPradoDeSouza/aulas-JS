<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div id="calc" class="calc">

        <div id="div_name" class="div_name">
            <p>Calculadora CFB</p>
        </div>
        <div id="div_display" class="display">
            <p id="display">0</p>
        </div>
        <div id="div_keys" class="div_keys">
            <button id="key7" class="key">7</button>
            <button id="key8" class="key">8</button>
            <button id="key9" class="key">9</button>
            <button id="keyAdd" class="key operationKey">+</button>
            <button id="key4" class="key">4</button>
            <button id="key5" class="key">5</button>
            <button id="key6" class="key">6</button>
            <button id="keySubtract" class="key operationKey">-</button>
            <button id="key9" class="key">1</button>
            <button id="key9" class="key">2</button>
            <button id="key9" class="key">3</button>
            <button id="keyMultiplication" class="key operationKey">x</button>
            <button id="key0" class="key">0</button>
            <button id="keyComma" class="key">,</button>
            <button id="keyEquals" class="key operationKey">=</button>
            <button id="keyDivision" class="key operationKey">/</button>

        </div>


    </div>

    <script src="main.js"></script>
</body>
</html>
