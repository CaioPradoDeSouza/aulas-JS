<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div id="calc" class="calc">

        <div id="div_name" class="div_name">
            <p>Calculadora CFB</p>
        </div>
        <div id="div_display" class="display">
            <p id="display">0</p>
        </div>
        <div id="div_keys" class="div_keys">
            <button id="keyClean" class="key ">CL</button>
            <button id="key(" class="key num">(</button>
            <button id="key)" class="key num">)</button>
            <button id="keyCopy" class="key">C</button>
            <button id="key7" class="key num">7</button>
            <button id="key8" class="key num">8</button>
            <button id="key9" class="key num">9</button>
            <button id="keyAdd" class="key operationKey op">+</button>
            <button id="key4" class="key num">4</button>
            <button id="key5" class="key num">5</button>
            <button id="key6" class="key num">6</button>
            <button id="keySubtract" class="key operationKey op">-</button>
            <button id="key1" class="key num">1</button>
            <button id="key2" class="key num">2</button>
            <button id="key3" class="key num">3</button>
            <button id="keyMultiplication" class="key operationKey op">x</button>
            <button id="key0" class="key num">0</button>
            <button id="keyComma" class="key num">,</button>
            <button id="keyEquals" class="key operationKey res">=</button>
            <button id="keyDivision" class="key operationKey op">/</button>

        </div>


    </div>

    <script src="main.js"></script>
</body>
</html>
